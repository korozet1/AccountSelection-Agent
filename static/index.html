<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>王者荣耀账号评估 Agent</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script>
      if (!localStorage.getItem("token")) window.location.replace("/static/login.html");
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>王者荣耀账号评估 Agent</h1>
            <p>按 1300 元、3 典藏、3 无双、2 珍品传说、30 传说、400 皮肤基准评估。</p>
          </div>
          <div class="topbar-actions">
            <span id="userDisplay" class="user-tag"></span>
            <button id="rulesBtn" type="button" class="btn-secondary">规则配置</button>
            <button id="sampleBtn" type="button">填入样例</button>
            <button id="logoutBtn" type="button" class="btn-secondary">登出</button>
          </div>
        </header>

        <div id="rulesPanel" class="panel rules-panel hidden">
          <h3>自定义评估规则</h3>
          <p class="hint">此处输入的规则会直接注入 LLM 评估，替换默认皮肤质量策略。支持 Markdown。</p>
          <div class="rules-tabs">
            <button class="rules-tab active" data-rule="skin_quality">皮肤质量规则</button>
            <button class="rules-tab" data-rule="system_prompt">自定义提示词</button>
            <button class="rules-tab" data-rule="baseline">基准线 JSON</button>
          </div>
          <textarea id="rulesEditor" rows="18" placeholder="在此粘贴你的自定义规则..."></textarea>
          <div class="rules-actions">
            <button id="saveRulesBtn" type="button">保存规则</button>
            <span id="rulesSaved" class="saved-tag"></span>
          </div>
        </div>

        <div class="content-grid">
          <form id="evaluateForm" class="panel">
            <label>
              商品链接
              <input id="urlInput" type="url" placeholder="https://www.pxb7.com/buy/10013/1?keyword=..." />
            </label>
            <label>
              商品详情文案
              <textarea id="detailInput" rows="10" placeholder="例如：售价1300，3典藏，3无双，2珍品传说，30传说，400皮肤..."></textarea>
            </label>
            <label>
              用途
              <input id="purposeInput" type="text" value="共号/出租变现" />
            </label>
            <div class="form-row">
              <label>
                最低预算
                <input id="minPriceInput" type="number" min="0" value="800" />
              </label>
              <label>
                最高预算
                <input id="maxPriceInput" type="number" min="0" value="2000" />
              </label>
            </div>
            <label>
              列表页最多抓取数量
              <input id="maxItemsInput" type="number" min="1" max="200" value="60" />
            </label>
            <label class="inline-option">
              <input id="useModelInput" type="checkbox" checked />
              使用模型复核最终报告
            </label>
            <button id="submitBtn" type="submit">开始评估</button>
          </form>

          <section class="panel output-panel">
            <div class="output-header">
              <h2>执行过程</h2>
              <span id="statusBadge">待评估</span>
            </div>
            <div id="events" class="events"></div>
          </section>
        </div>

        <section class="panel report-panel">
          <h2>最终报告</h2>
          <article id="report" class="report empty">评估完成后会显示结构化报告。</article>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
